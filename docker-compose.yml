# Application stack — rebuild and run the API against infra services.
#
# Prerequisites:
#   ./scripts/setup-env.sh
#   docker compose -f docker-compose.infra.yml up -d
#   docker compose -f docker-compose.infra.yml -f docker-compose.migrate.yml run --rm migrate
#
# Start / rebuild API (warms Redis TMDB cache from Postgres on startup):
#   docker compose -f docker-compose.infra.yml -f docker-compose.yml up --build -d
#
# Rebuild on code changes (Compose watch):
#   docker compose -f docker-compose.infra.yml -f docker-compose.yml watch
#
# Logs:
#   docker compose -f docker-compose.infra.yml -f docker-compose.yml logs -f api
#
# Stop API (keeps Postgres/Redis running):
#   docker compose -f docker-compose.infra.yml -f docker-compose.yml down

name: tvtime2serializd

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: ${PORT:-8080}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY}
      TMDB_API_KEY: ${TMDB_API_KEY:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
    ports:
      - "${API_HOST_PORT:-8080}:${PORT:-8080}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:$${PORT:-8080}/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - internal
    develop:
      watch:
        - action: rebuild
          path: .
          ignore:
            - graphify-out/
            - bin/
            - .git/
            - docker/
            - docker-compose*.yml
            - .env
            - .env.example

networks:
  internal:
    name: tvtime2serializd_internal
